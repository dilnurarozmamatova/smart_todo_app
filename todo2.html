<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Task App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #ff6b6b;
  color: white;
}

#result {
  margin-top: 20px;
  font-size: 18px;
}
</style>

</head>
<body>

<div class="container">
  <h2>😊 Mood Based Tasks</h2>
  <p>How are you feeling today?</p>

  <button onclick="getTask('happy')">😊 Happy</button>
  <button onclick="getTask('tired')">😴 Tired</button>
  <button onclick="getTask('sad')">😔 Sad</button>
  <button onclick="getTask('motivated')">🔥 Motivated</button>

  <div id="result"></div>
</div>

<script>
const tasks = {
  happy: [
    "Go for a walk 🚶‍♂️",
    "Share your happiness with a friend 😄",
    "Start a new project 💡"
  ],
  tired: [
    "Take a short nap 😴",
    "Drink water 💧",
    "Do light stretching 🧘"
  ],
  sad: [
    "Listen to music 🎵",
    "Talk to someone you trust 💬",
    "Write your feelings ✍️"
  ],
  motivated: [
    "Finish your tasks 💪",
    "Learn something new 📚",
    "Workout 🏋️"
  ]
};

function getTask(mood) {
  const random = Math.floor(Math.random() * tasks[mood].length);
  document.getElementById("result").innerText = tasks[mood][random];
}
</script>

</body>
</html>
